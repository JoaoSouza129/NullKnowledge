apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amnesia-shh
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/JoaoSouza129/NullKnowledge.git
    targetRevision: deploy
    path: k8s
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: amnesia-shh
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true