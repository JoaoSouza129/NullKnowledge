apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: amnesia-shh
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/joaosouza129/amnesia-shh-backend:sha-71ec103
        ports:
        - containerPort: 5050
        envFrom:
        - configMapRef:
            name: amnesia-config
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: amnesia-secret
              key: REDIS_PASSWORD
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 5050
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /healthz
            port: 5050
          initialDelaySeconds: 5
          periodSeconds: 10
