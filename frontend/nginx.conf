server {
    listen 80;
    server_name _;

    # Security headers (defesa em profundidade)
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-Frame-Options        "DENY"        always;
    add_header Referrer-Policy        "no-referrer" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' https://cdn.tailwindcss.com; style-src 'self' https://fonts.googleapis.com https://cdn.jsdelivr.net 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://amnesia-shh.duckdns.org;"
        always;

    # Ficheiros estáticos
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }

    # Clean URLs para o view.html funcionar com root estável
    location /v/ {
        root /usr/share/nginx/html;
        try_files /view.html =404;
        add_header Cache-Control "no-store";
    }

    # Bloquear acesso a ficheiros escondidos (.git, .env, etc.)
    location ~ /\. { deny all; }
}