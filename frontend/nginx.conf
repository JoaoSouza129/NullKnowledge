server {
    listen 80;
    server_name _;

    # Security headers (Ajustados com Tailwind e DuckDNS legítimos)
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-Frame-Options        "DENY"        always;
    add_header Referrer-Policy        "no-referrer" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' https://cdn.tailwindcss.com; style-src 'self' https://fonts.googleapis.com https://cdn.jsdelivr.net 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://amnesia-shh.duckdns.org;"
        always;

    # Ficheiros estáticos
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }

    # CORREÇÃO DA ARQUITETURA: Usa rewrite estável para SPA routing em vez de try_files ambíguo
    location /v/ {
        rewrite ^/v/.*$ /view.html break;
        add_header Cache-Control "no-store";
    }

    # Reverse proxy para o backend (redundância mantida via variáveis do Docker)
    location /api/ {
        proxy_pass http://${BACKEND_HOST}:${BACKEND_PORT};
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
    }

    # Bloquear acesso a ficheiros escondidos (.git, .env, etc.)
    location ~ /\. { deny all; }
}