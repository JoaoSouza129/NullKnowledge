server {
    listen 80;
    server_name _;

    # Security headers (defesa em profundidade)
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-Frame-Options        "DENY"        always;
    add_header Referrer-Policy        "no-referrer" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; img-src 'self' data:; connect-src 'self'"
        always;

    # Ficheiros estáticos
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";   # impede cache de páginas com segredos
    }

    # Reverse proxy para o backend (caminho relativo no JS → funciona aqui)
    location /api/ {
        proxy_pass http://${BACKEND_HOST}:${BACKEND_PORT};
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
    }

    # Bloquear acesso a ficheiros escondidos (.git, .env, etc.)
    location ~ /\. { deny all; }
}
