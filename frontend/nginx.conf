server {
    listen 80;
    server_name _;

    # Ocultar versão do nginx
    server_tokens off;

    # HSTS — força HTTPS por 1 ano
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Permissions Policy — desativa APIs desnecessárias
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # COEP — isolamento de origem
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-Frame-Options        "DENY"        always;
    add_header Referrer-Policy        "no-referrer" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' https://cdn.tailwindcss.com; style-src 'self' https://fonts.googleapis.com https://cdn.jsdelivr.net 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://amnesia-shh.duckdns.org;"
        always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }

    location ~ ^/v/ {
        try_files /view.html =404;
        add_header Cache-Control "no-store";
    }

    location /api/ {
        proxy_pass http://${BACKEND_HOST}:${BACKEND_PORT};
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
    }

    location ~ /\. { deny all; }
}